name: cmandili_partner
description: A premium food delivery partner application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Firebase (Removed for design-only mode)
  # firebase_core: ^2.24.2
  # firebase_auth: ^4.15.3
  # cloud_firestore: ^4.13.6
  
  # Authentication (Removed for design-only mode)
  google_sign_in: ^6.1.6
  # sign_in_with_apple: ^5.0.0
  supabase_flutter: ^2.3.0
  
  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  
  # UI & Images
  cached_network_image: ^3.3.0
  image_picker: ^1.0.7
  flutter_svg: ^2.0.9
  lottie: ^2.7.0
  shimmer: ^3.0.0
  
  # Utilities
  intl: any
  uuid: ^4.2.2
  shared_preferences: ^2.2.2
  flutter_dotenv: ^5.1.0
  
  # Voice & Audio
  flutter_sound: ^9.2.13
  permission_handler: ^11.1.0
  path_provider: ^2.1.1
  
  # Sharing
  share_plus: ^7.2.2

  # Phone call / external launches
  url_launcher: ^6.2.5
  
  # Icons
  cupertino_icons: ^1.0.6
  badges: ^3.1.2

  # Code generation annotations
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  freezed: ^2.4.5
  build_runner: ^2.4.6
  json_serializable: ^6.7.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21 # android min sdk min:16, default 21

flutter:
  generate: true
  uses-material-design: true
  
  assets:
    - .env
    - assets/images/
    - assets/animations/
    - assets/icons/
  
  # fonts:
