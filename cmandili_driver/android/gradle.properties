org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true

# Mapbox SDK download token — secret (sk.*) with DOWNLOADS:READ scope.
# Used ONLY by Gradle at build time to fetch the Mapbox Android SDK from
# api.mapbox.com/downloads. MUST NOT be embedded in the app. Do not commit
# this file — see .gitignore. In CI, set MAPBOX_DOWNLOADS_TOKEN as a secret
# env var; Gradle picks it up via the same property name.
MAPBOX_DOWNLOADS_TOKEN=sk.YOUR_MAPBOX_SECRET_DOWNLOAD_TOKEN_HERE
